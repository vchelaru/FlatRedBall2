<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShmupSpace (KNI BlazorGL)</title>
    <base href="./" />
</head>
<body style="margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: auto; background: #222;">
    <div id="app">Loading...</div>
    <div id="blazor-error-ui" style="display:none; position:fixed; bottom:0; left:0; width:100%; padding:0.6rem 1.25rem; background:lightyellow; z-index:1000;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss" style="cursor:pointer; position:absolute; right:0.75rem; top:0.5rem;">x</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.XR/js/XR.8.0.11.js"></script>

    <script>
        // KNI BlazorGL resizes canvas.width/height on browser resize. Re-pin every frame so
        // the drawing buffer stays at the design resolution set by initRenderJS.
        var lockW = 0, lockH = 0;
        function tickJS() {
            var canvas = document.getElementById('theCanvas');
            if (canvas) {
                if (canvas.width !== lockW) canvas.width = lockW;
                if (canvas.height !== lockH) canvas.height = lockH;
            }
            window.theInstance.invokeMethod('TickDotNet');
            window.requestAnimationFrame(tickJS);
        }

        window.initRenderJS = (instance) => {
            window.theInstance = instance;
            var canvas = document.getElementById('theCanvas');
            var holder = document.getElementById('canvasHolder');
            lockW = holder.clientWidth;
            lockH = holder.clientHeight;
            canvas.width = lockW;
            canvas.height = lockH;
            canvas.addEventListener("contextmenu", e => e.preventDefault());
            window.requestAnimationFrame(tickJS);
        };
    </script>
</body>
</html>
