name: Publish AnimationChain Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override, e.g. 1.0.0-preview.1 (leave blank to auto-increment)'
        required: false
        default: ''

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using manual version: ${{ github.event.inputs.version }}"
            exit 0
          fi

          LATEST=$(curl -sf https://api.nuget.org/v3-flatcontainer/flatredball.animationchain.monogame/index.json | jq -r '.versions[-1]' || true)
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Could not fetch latest version from NuGet. Pass a version override for the first publish."
            exit 1
          fi

          # Increment the last numeric segment (e.g. 1.0.0-preview.3 -> 1.0.0-preview.4)
          PREFIX="${LATEST%.*}"
          LAST="${LATEST##*.}"
          NEXT="$PREFIX.$((LAST + 1))"

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Auto-incremented from $LATEST to $NEXT"

  publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: src/AnimationChain.MonoGame/AnimationChain.MonoGame.csproj
            label: MonoGame
          - project: src/AnimationChain.MonoGame/AnimationChain.KNI.csproj
            label: KNI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack (${{ matrix.label }})
        run: >
          dotnet pack ${{ matrix.project }}
          -c Release
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
