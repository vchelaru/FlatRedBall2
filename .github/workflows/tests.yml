name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      # FlatRedBall2 currently project-references Gum at ..\..\Gum from src/FlatRedBall2.csproj
      # for in-place iteration. Both repos must be cloned as siblings under $GITHUB_WORKSPACE
      # so the relative path resolves the same way it does locally. When FRB2 switches back to
      # the Gum NuGet packages, the Checkout Gum step and the working-directory entries can go.
      - name: Checkout FlatRedBall2
        uses: actions/checkout@v4
        with:
          path: FlatRedBall2

      - name: Checkout Gum
        uses: actions/checkout@v4
        with:
          repository: vchelaru/Gum
          ref: main
          path: Gum

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('FlatRedBall2/**/*.csproj', 'Gum/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Gum multi-targets to TFMs that need iOS / wasm workloads not preinstalled on the
      # ubuntu runner. Restore the workloads transitively before the build instead of
      # trying to filter Gum's TFMs at the command line — global -p:TargetFramework
      # propagates inconsistently across multi-TFM ProjectReferences and breaks the build.
      - name: Restore workloads
        working-directory: FlatRedBall2
        run: dotnet workload restore tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj

      - name: Restore
        working-directory: FlatRedBall2
        run: dotnet restore tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj

      - name: Test
        working-directory: FlatRedBall2
        run: dotnet test tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj --no-restore --verbosity normal
