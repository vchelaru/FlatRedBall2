name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    name: Engine and AnimationEditor tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # TEMP diagnostic (throwaway branch, not for merge) — full suite, but with a trx logger
      # so we get every individual test's duration, to find the real cost driver behind the
      # normal 15-minute wall time (two smaller targeted diagnostics both came back fast, so
      # this checks whether it's a hidden long tail or full-scale parallel contention instead).
      - name: TEMP diagnostic timing (full suite, trx)
        run: dotnet test tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj --verbosity minimal --logger "trx;LogFileName=results.trx" --logger "console;verbosity=minimal"

      - name: Upload trx results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-trx
          path: tests/FlatRedBall2.Tests/TestResults/results.trx

  animationchain-pack:
    name: Pack AnimationChain NuGet (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Package outputs land in out/animationchain and are uploaded as workflow artifacts.
      - name: Pack AnimationChain package
        run: >
          dotnet pack src/AnimationChain.MonoGame/AnimationChain.MonoGame.csproj
          -c Release
          -o out/animationchain

      - name: Upload AnimationChain package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: animationchain-nuget-packages
          path: out/animationchain/*.nupkg
          if-no-files-found: error
          retention-days: 7

  animation-content-pack:
    name: Pack Animation.Content NuGet (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Package outputs land in out/animation-content and are uploaded as workflow artifacts.
      - name: Pack Animation.Content package
        run: >
          dotnet pack src/Animation.Content/FlatRedBall2.Animation.Content.csproj
          -c Release
          -o out/animation-content

      - name: Upload Animation.Content package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: animation-content-nuget-packages
          path: out/animation-content/*.nupkg
          if-no-files-found: error
          retention-days: 7

  # Umbrella check that branch protection gates on. Stays named "dotnet test" so the
  # existing required-status-check entry in the main-protection ruleset keeps matching.
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    needs: [engine-tests, animationchain-pack, animation-content-pack]
    steps:
      - name: All test and packaging jobs passed
        run: echo "engine-tests, animationchain-pack, and animation-content-pack succeeded"
