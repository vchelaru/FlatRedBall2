name: Build and Release Animation Editor

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: 'Type'
        type: choice
        options: [release, prerelease, test]   # test = draft
        default: test
        required: true

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.meta.outputs.version }}
      tag:        ${{ steps.meta.outputs.tag }}
      title:      ${{ steps.meta.outputs.title }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft:      ${{ steps.meta.outputs.draft }}
    steps:
      - name: Compute version + tag + title
        id: meta
        shell: pwsh
        run: |
          $version = (Get-Date).ToString('yyyy.MM.dd')
          $kind = "${{ github.event.inputs.release_kind }}"
          switch ($kind) {
            'release'    { $prefix='Release';    $prerelease='false'; $draft='false' }
            'prerelease' { $prefix='PreRelease'; $prerelease='true';  $draft='false' }
            'test'       { $prefix='Test';       $prerelease='true';  $draft='true'  }
          }
          $title = "$prefix " + (Get-Date).ToString('MMMM d, yyyy')
          $tag   = "ae-${prefix}_" + (Get-Date).ToString('MMMM_dd_yyyy')
          if ($kind -eq 'test') { $tag = "$tag-$($env:GITHUB_RUN_NUMBER)" }
          "version=$version"       >> $env:GITHUB_OUTPUT
          "tag=$tag"               >> $env:GITHUB_OUTPUT
          "title=Animation Editor $title" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "draft=$draft"           >> $env:GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test AnimationEditor solution
        run: dotnet test tools/AnimationEditorAvalonia/AnimationEditorAvalonia.slnx -c Release

  build:
    needs: [meta, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
            asset: AnimationEditor-win-x64.zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
            asset: AnimationEditor-linux-x64.tar.gz
          - rid: osx-x64
            os: macos-latest
            archive: zip
            asset: AnimationEditor-osx-x64.zip
          - rid: osx-arm64
            os: macos-latest
            archive: zip
            asset: AnimationEditor-osx-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj -r ${{ matrix.rid }}

      - name: Publish (${{ matrix.rid }}, self-contained single-file)
        run: >
          dotnet publish
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.meta.outputs.version }}
          -o dist/publish

      - name: Mark binary executable (non-Windows)
        if: matrix.os != 'windows-latest'
        run: chmod +x dist/publish/AnimationEditor

      # Wraps the published single-file binary as a real macOS .app bundle (Contents/MacOS,
      # Contents/Resources, Contents/Info.plist) instead of shipping a bare executable. A bare
      # exe has no CFBundleIdentifier at runtime, which breaks anything that resolves the app
      # via NSRunningApplication/ScreenCaptureKit (e.g. screen-recording tools), and Finder has
      # no icon/display name to show. Mirrors the dev-only CreateMacOSDevBundle MSBuild target
      # in AnimationEditor.App.csproj, which only fires for local `dotnet build` on macOS.
      - name: Assemble macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          APP=dist/bundle/AnimationEditor.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/publish/AnimationEditor "$APP/Contents/MacOS/AnimationEditor"
          chmod +x "$APP/Contents/MacOS/AnimationEditor"
          cp tools/AnimationEditorAvalonia/src/AnimationEditor.App/Assets/icons/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          cp tools/AnimationEditorAvalonia/src/AnimationEditor.App/macos/Info.plist "$APP/Contents/Info.plist"

      # Ad-hoc sign (no Apple Developer ID / notarization — none is configured for this repo).
      # Without any signature, Gatekeeper rejects the bundle outright on first launch with
      # "AnimationEditor.app is damaged and can't be opened", which is misleading — the bundle
      # isn't corrupt, it's just unsigned. Ad-hoc signing replaces that hard rejection with the
      # normal "unidentified developer" prompt users can approve once via Settings > Privacy.
      - name: Ad-hoc sign macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: codesign --force --deep --sign - dist/bundle/AnimationEditor.app

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/out | Out-Null
          Compress-Archive -Path "dist/publish/*" -DestinationPath "dist/out/${{ matrix.asset }}"

      # PowerShell's Compress-Archive doesn't store Unix permission bits in the zip's
      # external attributes, so the chmod +x above gets silently dropped and the
      # extracted binary loses its executable bit. Native `zip` preserves it.
      - name: Package (zip, macOS .app bundle)
        if: matrix.archive == 'zip' && matrix.os == 'macos-latest'
        # `zip` doesn't preserve the extended-attribute/resource-fork data a code signature's
        # seal depends on, so a plain-zipped signed bundle can still fail Gatekeeper validation
        # after unzip. `ditto` is Apple's own tool for packaging signed .app bundles and
        # preserves that metadata correctly.
        run: |
          mkdir -p dist/out
          ditto -c -k --sequesterRsrc --keepParent dist/bundle/AnimationEditor.app "dist/out/${{ matrix.asset }}"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist/out
          tar -czf "dist/out/${{ matrix.asset }}" -C dist/publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/out/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Create tag (release only)
        if: github.event.inputs.release_kind == 'release'
        shell: pwsh
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git tag -a "${{ needs.meta.outputs.tag }}" -m "${{ needs.meta.outputs.title }}"
          git push origin "${{ needs.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.meta.outputs.tag }}
          name:       ${{ needs.meta.outputs.title }}
          generate_release_notes: true
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft:      ${{ needs.meta.outputs.draft }}
          files: |
            dist/AnimationEditor-win-x64.zip
            dist/AnimationEditor-linux-x64.tar.gz
            dist/AnimationEditor-osx-x64.zip
            dist/AnimationEditor-osx-arm64.zip
