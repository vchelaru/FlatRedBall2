name: Publish FlatRedBall2.Kni

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0-preview.1)'
        required: true
        default: '0.1.0-preview.1'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Use 10.0.x as it's the SDK version for the project

      - name: Restore dependencies
        run: dotnet restore src/FlatRedBall2.csproj

      - name: Build and Pack
        # We override PackageId to FlatRedBall2.Kni and restrict TargetFrameworks to net8.0
        run: >
          dotnet pack src/FlatRedBall2.csproj 
          -c Release 
          -p:PackageId=FlatRedBall2.Kni 
          -p:TargetFrameworks=net8.0 
          -p:PackageVersion=${{ github.event.inputs.version }} 
          -o out

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
