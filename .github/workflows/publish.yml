name: Publish FlatRedBall2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override, e.g. 0.2.0-preview.1 (leave blank to auto-increment preview number)'
        required: false
        default: ''

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using manual version: ${{ github.event.inputs.version }}"
            exit 0
          fi

          # Query NuGet for the latest version of the primary package
          VERSIONS=$(curl -sf https://api.nuget.org/v3-flatcontainer/flatredball2.monogame/index.json | jq -r '.versions[-1]')
          if [ -z "$VERSIONS" ] || [ "$VERSIONS" = "null" ]; then
            echo "::error::Could not fetch latest version from NuGet"
            exit 1
          fi

          LATEST="$VERSIONS"
          echo "Latest NuGet version: $LATEST"

          # Increment the last numeric segment (e.g. 0.1.0-preview.3 -> 0.1.0-preview.4)
          PREFIX="${LATEST%.*}"
          LAST="${LATEST##*.}"
          NEXT="$PREFIX.$((LAST + 1))"

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Auto-incremented to: $NEXT"

  publish-animation-content:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Animation.Content/FlatRedBall2.Animation.Content.csproj

      - name: Build and Pack (FlatRedBall2.Animation.Content)
        run: >
          dotnet pack src/Animation.Content/FlatRedBall2.Animation.Content.csproj
          -c Release
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  # Depends on publish-animation-content so FlatRedBall2.Animation.Content is already on nuget.org
  # (matching this same resolved version) before FlatRedBall2.MonoGame/Kni's auto-generated
  # dependency on it needs to resolve. See src/Animation.Content/FlatRedBall2.Animation.Content.csproj
  # for why this dependency exists at all.
  publish:
    needs: [resolve-version, publish-animation-content]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - packageId: FlatRedBall2.MonoGame
            targetFrameworks: net10.0
          - packageId: FlatRedBall2.Kni
            targetFrameworks: net8.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # nuget.org indexing lags a push by a few seconds; a consumer restoring FlatRedBall2.MonoGame/Kni
      # right after this job finishes needs FlatRedBall2.Animation.Content to already be resolvable at
      # this exact version, not just pushed. `needs: publish-animation-content` only guarantees the push
      # happened first, not that it's indexed yet.
      - name: Wait for FlatRedBall2.Animation.Content to be resolvable on NuGet
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VERSION_LOWER=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          URL="https://api.nuget.org/v3-flatcontainer/flatredball2.animation.content/$VERSION_LOWER/flatredball2.animation.content.$VERSION_LOWER.nupkg"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "FlatRedBall2.Animation.Content $VERSION is resolvable on NuGet."
              exit 0
            fi
            echo "Attempt $i/20: got HTTP $STATUS for $URL, waiting 15s..."
            sleep 15
          done
          echo "::error::FlatRedBall2.Animation.Content $VERSION never became resolvable on NuGet after 5 minutes."
          exit 1

      - name: Restore dependencies
        run: dotnet restore src/FlatRedBall2.csproj

      # Use FlatRedBallDependencyPackageId, not the raw PackageId MSBuild property, to rename the
      # output package. PackageId is a *global* property: passing -p:PackageId=X here would also
      # override the PackageId of the Animation.Content ProjectReference (global properties
      # propagate to every project pulled in via ProjectReference), making both projects resolve
      # to the same PackageId and fail restore with "Ambiguous project name 'X'".
      # FlatRedBallDependencyPackageId is a project-local indirection (see src/FlatRedBall2.csproj)
      # that only FlatRedBall2.csproj itself reads, so it can't collide with a sibling project.
      - name: Build and Pack (${{ matrix.packageId }})
        run: >
          dotnet pack src/FlatRedBall2.csproj
          -c Release
          -p:FlatRedBallDependencyPackageId=${{ matrix.packageId }}
          -p:TargetFrameworks=${{ matrix.targetFrameworks }}
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      # Guards against a repeat of the exact bug this workflow already hit once: the ProjectReference
      # to Animation.Content auto-generates a <dependency> in this nuspec, and nothing else here checks
      # that its version actually matches what publish-animation-content pushed. A mismatch would only
      # surface later as a broken `dotnet add package` for an end user, after --skip-duplicate makes it
      # awkward to fix at the same version number.
      - name: Verify Animation.Content dependency version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          NUSPEC=$(unzip -p out/*.nupkg "*.nuspec")
          if ! echo "$NUSPEC" | grep -qF "<dependency id=\"FlatRedBall2.Animation.Content\" version=\"$VERSION\""; then
            echo "::error::Generated nuspec does not depend on FlatRedBall2.Animation.Content $VERSION. Aborting before publish."
            echo "$NUSPEC" | grep -i "Animation.Content" || echo "(no Animation.Content dependency found at all)"
            exit 1
          fi
          echo "Confirmed: nuspec depends on FlatRedBall2.Animation.Content $VERSION."

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-templates:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack Templates
        run: >
          dotnet pack templates/FlatRedBall2.Templates.csproj
          -c Release
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish Templates to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

